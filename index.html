// category colors
var COLORS = {
  "Image Generation":"#8b5cf6",
  "Video Generation":"#ef4444",
  "Audio & Voice":"#f59e0b",
  "Writing & Content":"#10b981",
  "Code Assistant":"#3b82f6",
  "AI Agents":"#ec4899",
  "Productivity":"#06b6d4",
  "Research & Search":"#84cc16",
  "Data & Analytics":"#f97316",
  "Design & UI":"#a855f7"
};

function groupBy(arr){
  var g={};
  arr.forEach(function(t){
    var c=t.Category||'Other';
    if(!g[c]) g[c]=[];
    g[c].push(t);
  });
  return g;
}

function renderNav(tools){
  var nav=document.getElementById('nav');
  var groups=groupBy(tools);
  if(!Object.keys(groups).length){
    nav.innerHTML='<div class="no-results">No tools found.</div>';
    return;
  }
  nav.innerHTML='';
  Object.keys(groups).forEach(function(cat){
    var items=groups[cat];
    var color=COLORS[cat]||'#888';
    var div=document.createElement('div');
    div.className='cat-group open';
    var toolsHTML=items.map(function(t){
      return '<div class="tool-item" data-id="'+t.ID+'" onclick="showTool('+t.ID+')">'+
        '<span class="tdot" style="background:'+color+'"></span>'+
        '<span class="tname">'+t["Tool Name"]+'</span></div>';
    }).join('');
    div.innerHTML=
      '<div class="cat-header" onclick="this.parentElement.classList.toggle(\\'open\\')">'+
        '<span class="cdot" style="background:'+color+'"></span>'+
        '<span class="ctitle">'+cat+'</span>'+
        '<span class="ccount">'+items.length+'</span>'+
        '<span class="carrow">&#9658;</span>'+
      '</div>'+
      '<div class="tool-list">'+toolsHTML+'</div>';
    nav.appendChild(div);
  });
}

function showTool(id){
  var tool=TOOLS.find(function(t){return Number(t.ID)===id;});
  if(!tool) return;
  document.querySelectorAll('.tool-item').forEach(function(el){el.classList.remove('active');});
  var el=document.querySelector('[data-id="'+id+'"]');
  if(el) el.classList.add('active');
  document.getElementById('welcome').style.display='none';
  var detail=document.getElementById('detail');
  detail.className='detail show';
  var color=COLORS[tool.Category]||'#888';
  var kws=(tool.Keywords||'').split(',').map(function(k){return k.trim();}).filter(Boolean);
  detail.innerHTML =
    '<div class="dheader">'+
      '<span style="width:10px;height:10px;border-radius:50%;background:'+color+';display:inline-block;flex-shrink:0"></span>'+
      '<h2>'+tool["Tool Name"]+'</h2>'+
      '<span class="dbadge" style="background:'+color+'22;color:'+color+'">'+tool.Category+'</span>'+
    '</div>'+
    '<div class="dbody">'+
      '<div class="card"><div class="lbl">What It Does</div><div class="val">'+tool["What It Does"]+'</div></div>'+
      '<div class="grid2">'+
        '<div class="card"><div class="lbl">Best For</div><div class="val"><span class="best-tag" style="background:'+color+'18;color:'+color+'">&#128100; '+tool["Best For"]+'</span></div></div>'+
        '<div class="card"><div class="lbl">Tool ID</div><div class="val" style="color:#aaa">#'+tool.ID+'</div></div>'+
      '</div>'+
      '<div class="free-card"><div class="lbl">&#x1F7E2; Free Plan Details</div><div class="val">'+tool["Free Plan Details"]+'</div></div>'+
      (kws.length ? '<div class="card"><div class="lbl">Keywords</div><div class="kw-row">'+kws.map(function(k){return '<span class="kw">'+k+'</span>';}).join('')+'</div></div>' : '')+
    '</div>';
}

function doSearch(q){
  q=q.toLowerCase().trim();
  var filtered=!q ? TOOLS : TOOLS.filter(function(t){
    return (t["Tool Name"]||'').toLowerCase().includes(q) ||
           (t.Category||'').toLowerCase().includes(q) ||
           (t.Keywords||'').toLowerCase().includes(q) ||
           (t["What It Does"]||'').toLowerCase().includes(q) ||
           (t["Best For"]||'').toLowerCase().includes(q);
  });
  renderNav(filtered);
  if(q) document.querySelectorAll('.cat-group').forEach(function(g){g.classList.add('open');});
}

// initial render
renderNav(TOOLS);
</script>
