<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agentic Workflow</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>

  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --surface-2: #eef2f8;
      --surface-3: #e7edf7;
      --text: #111827;
      --muted: #667085;
      --muted-2: #98a2b3;
      --border: rgba(17, 24, 39, 0.08);
      --border-strong: rgba(17, 24, 39, 0.14);
      --primary: #2563eb;
      --primary-2: #1d4ed8;
      --primary-soft: rgba(37, 99, 235, 0.08);
      --success: #157f3d;
      --warning: #a16207;
      --shadow-sm: 0 8px 24px rgba(15, 23, 42, 0.06);
      --shadow-md: 0 20px 50px rgba(15, 23, 42, 0.10);
      --radius-sm: 14px;
      --radius-md: 18px;
      --radius-lg: 24px;
      --radius-full: 999px;
      --max-width: 1440px;
    }

    html[data-theme="dark"] {
      --bg: #0b1020;
      --surface: #12192b;
      --surface-2: #182033;
      --surface-3: #1c253b;
      --text: #edf2ff;
      --muted: #9aa4b2;
      --muted-2: #7f8b9d;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --primary: #7cb3ff;
      --primary-2: #5c97ea;
      --primary-soft: rgba(124, 179, 255, 0.12);
      --success: #4ade80;
      --warning: #fbbf24;
      --shadow-sm: 0 10px 30px rgba(0, 0, 0, 0.24);
      --shadow-md: 0 24px 60px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,0.08), transparent 22%),
        radial-gradient(circle at top right, rgba(124,58,237,0.06), transparent 18%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      font-size: 16px;
    }

    button, input, select {
      font: inherit;
      color: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app-shell {
      width: min(var(--max-width), calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0 32px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 14px 0 18px;
      backdrop-filter: blur(14px);
      background: color-mix(in srgb, var(--bg) 82%, transparent);
    }

    .topbar-inner {
      width: min(var(--max-width), calc(100% - 32px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      letter-spacing: -0.04em;
      box-shadow: var(--shadow-sm);
      flex-shrink: 0;
    }

    .brand-copy h1 {
      font-size: 1.08rem;
      line-height: 1.2;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .brand-copy p {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 10px 16px;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: var(--shadow-sm);
      font-weight: 500;
      font-size: 0.92rem;
    }

    .btn:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .btn.primary {
      background: var(--primary);
      color: white;
      border-color: transparent;
    }

    .btn.primary:hover {
      background: var(--primary-2);
    }

    .btn.ghost {
      background: transparent;
      box-shadow: none;
    }

    .hero {
      padding: 18px 0 22px;
    }

    .hero-card {
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 92%, transparent), var(--surface));
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: var(--shadow-md);
      padding: 34px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .hero-copy {
      max-width: 760px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: var(--radius-full);
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .hero-copy h2 {
      font-size: clamp(2.1rem, 1.5rem + 2vw, 4rem);
      line-height: 1.04;
      letter-spacing: -0.06em;
      margin-bottom: 14px;
      max-width: 12ch;
    }

    .hero-copy p {
      max-width: 62ch;
      color: var(--muted);
      font-size: 1rem;
    }

    .hero-metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 16px;
      width: 100%;
    }

    .metric-card {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: clamp(1.8rem, 1.3rem + 1vw, 2.4rem);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 6px;
    }

    .metric-note {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .workspace {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .sidebar,
    .content-panel,
    .search-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      border-radius: 28px;
    }

    .sidebar {
      padding: 24px;
      position: sticky;
      top: 96px;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
    }

    .sidebar-head h3 {
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .sidebar-section + .sidebar-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .sidebar-label {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .select,
    .input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      padding: 13px 14px;
      border-radius: 14px;
      outline: none;
      transition: 0.2s ease;
    }

    .select:focus,
    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-soft);
    }

    .chip-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-size: 0.82rem;
      transition: 0.18s ease;
    }

    .chip:hover,
    .chip.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: color-mix(in srgb, var(--primary) 35%, var(--border));
    }

    .content-area {
      display: grid;
      gap: 20px;
    }

    .search-panel {
      padding: 22px;
    }

    .search-panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .search-panel-top h3 {
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .search-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .search-main {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      padding: 15px 16px;
      border-radius: 18px;
      transition: 0.2s ease;
    }

    .search-main:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-soft);
    }

    .search-main input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 1rem;
    }

    .search-main input::placeholder {
      color: var(--muted);
    }

    .search-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .result-count {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .kbd {
      border: 1px solid var(--border);
      background: var(--surface-2);
      border-radius: 10px;
      padding: 4px 8px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: var(--radius-full);
      font-size: 0.82rem;
    }

    .content-panel {
      padding: 22px;
    }

    .results-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .results-head h3 {
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .tool-card {
      background: linear-gradient(180deg, color-mix(in srgb, var(--surface) 92%, transparent), var(--surface-2));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 260px;
      transition: 0.2s ease;
    }

    .tool-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
      border-color: var(--border-strong);
    }

    .tool-card-top {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .tool-card-top h4 {
      font-size: 1.08rem;
      line-height: 1.3;
      letter-spacing: -0.03em;
    }

    .badge {
      padding: 6px 10px;
      background: var(--primary-soft);
      color: var(--primary);
      border-radius: var(--radius-full);
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .tool-desc {
      color: var(--muted);
      font-size: 0.93rem;
      line-height: 1.7;
    }

    .tool-info {
      display: grid;
      gap: 10px;
    }

    .tool-info-row {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .tool-info-row strong {
      color: var(--text);
    }

    .keyword-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .keyword {
      background: var(--surface-3);
      color: var(--muted);
      border-radius: var(--radius-full);
      padding: 6px 10px;
      font-size: 0.76rem;
      border: 1px solid var(--border);
    }

    .tool-actions {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tool-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: var(--radius-full);
      font-size: 0.88rem;
      font-weight: 600;
      border: 1px solid transparent;
      background: var(--primary);
      color: #fff;
    }

    .tool-link.secondary {
      background: transparent;
      color: var(--text);
      border-color: var(--border);
    }

    .empty-state,
    .loading-state {
      padding: 50px 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--border-strong);
      border-radius: 22px;
      background: var(--surface-2);
    }

    .mobile-filter-toggle {
      display: none;
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .results-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 820px) {
      .hero-card {
        padding: 24px;
      }

      .hero-metrics {
        grid-template-columns: 1fr;
      }

      .search-box {
        grid-template-columns: 1fr;
      }

      .results-grid {
        grid-template-columns: 1fr;
      }

      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 640px) {
      .app-shell,
      .topbar-inner {
        width: min(var(--max-width), calc(100% - 20px));
      }

      .hero-copy h2 {
        max-width: 100%;
      }

      .sidebar,
      .search-panel,
      .content-panel,
      .hero-card {
        border-radius: 22px;
      }
    }
  </style>
</head>
<body>
